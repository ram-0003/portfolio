<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Rounded Square Background with premium styling -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#faviconGrad)" />
  <rect x="5" y="5" width="90" height="90" rx="22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.25" />
  
  <!-- Modern Geometric R with automation/code node symbolics -->
  <g transform="translate(10, 10)">
    <path d="M25,20 L50,20 C60,20 65,25 65,32 C65,39 60,44 50,44 L25,44 Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M25,20 L25,65" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <path d="M42,44 L60,65" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    
    <!-- Connected Automation Circular Node in top-right -->
    <circle cx="58" cy="32" r="4.5" fill="#e2e8f0" stroke="#6366f1" stroke-width="2" filter="url(#glow)" />
  </g>
</svg>
